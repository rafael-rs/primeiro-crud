
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Meu Crud{% endblock %}</title>
</head>
<body>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <script>
            {% for msg in messages %}
                alert("{{ msg }}");
            {% endfor %}
        </script>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
</body>
</html>
