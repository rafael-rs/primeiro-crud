
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Site made with Mobirise Website Builder v6.1.4, https://mobirise.com -->
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="generator" content="Mobirise v6.1.4, mobirise.com">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1">
    <link rel="shortcut icon" href="{{ url_for('static', filename='assets/images/mbr.png') }}" type="image/x-icon">
    <meta name="description" content="">

    <title>{{ title or "Home" }}</title>

    <!-- CSS principais -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/web/assets/mobirise-icons2/mobirise2.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/bootstrap/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/dropdown/css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/theme/css/style.css') }}">

    <!-- Fontes -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700&display=swap"
            as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;700&display=swap">
    </noscript>

    <!-- CSS adicional -->
    <link rel="preload" as="style" href="{{ url_for('static', filename='assets/mobirise/css/mbr-additional.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/mobirise/css/mbr-additional.css') }}" type="text/css">

    {% block extra_head %}{% endblock %}
</head>

<body>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
        <script>
            {% for msg in messages %}
                alert("{{ msg }}");
            {% endfor %}
        </script>
        {% endif %}
    {% endwith %}

    <section data-bs-version="5.1" class="menu menu3 cid-v0dquRgnfJ" once="menu" id="menu03-6">
  <nav class="navbar navbar-dropdown navbar-fixed-top navbar-expand-lg">
    <div class="container">
      <div class="navbar-brand">
        <span class="navbar-logo">
          <img src="{{ url_for('static', filename='assets/images/mbr.png') }}" alt="Logo" style="height: 4rem;">
        </span>
      </div>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <div class="hamburger">
          <span></span><span></span><span></span><span></span>
        </div>
      </button>

      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav nav-dropdown nav-right" data-app-modern-menu="true">
          <li class="nav-item">
            <a class="nav-link link text-black display-4" href="{{ url_for('home') }}">Home</a>
          </li>
          {% if session.get('user_id') %}
            <li class="nav-item">
              <a class="nav-link link text-black display-4" href="{{ url_for('update') }}">Minha Conta</a>
            </li>
          {% endif %}
        </ul>
        {% if session.get('user_id') %}
          <div class="icons-menu">
            <a class="iconfont-wrapper" href="{{ url_for('logout') }}">
              <span class="p-2 mbr-iconfont mobi-mbri-logout mobi-mbri"></span>
            </a>
          </div>
        {% endif %}
      </div>
    </div>
  </nav>
</section>

    {% block content %}{% endblock %}
</body>
</html>
