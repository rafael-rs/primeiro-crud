{% extends "base.html" %}
{% block content %}
  {% if session.get('user_id') %}
    <h2>Bem-vindo, {{ session.get('user_name') }}!</h2>
    <form method="POST" action="{{ url_for('logout') }}">
        <button type="submit">Logout</button>
        <a href="{{url_for('update')}}" style="padding:10px 20px; background-color:#007BFF; color:white; border:none; border-radius:5px; text-decoration:none;">Area do Usuario</a>
    </form>
  {% else %}
    <h2>Login</h2>
    <form method="POST" action="/login">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" required><br><br>

        <button type="submit">Entrar</button>
        <a href="{{url_for('cadastro')}}" style="padding:10px 20px; background-color:#007BFF; color:white; border:none; border-radius:5px; text-decoration:none;">Cadastro</a>
    </form>
  {% endif %}
{% endblock %}
