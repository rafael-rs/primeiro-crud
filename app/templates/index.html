{% extends "base.html" %}
{% block extra_head %}
<body>
<section data-bs-version="5.1" class="form5 cid-v0dxrdDOLp" id="form02-2">
    
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 content-head">
                <div class="mbr-section-head mb-5">
                    <h3 class="mbr-section-title mbr-fonts-style align-center mb-0 display-2">
                        <strong>Login</strong></h3>
                    
                </div>
            </div>
        </div>
        {% if session.get('user_id') %}
            <h2>Bem-vindo, {{ session.get('user_name') }}!</h2>
            <form method="POST" action="{{ url_for('logout') }}">
                <button type="submit" class="btn btn-primary display-7">Logout</button>
                <a href="{{url_for('update')}}" class="btn btn-primary display-7">Area do Usuario</a>        
            </form>
        {% else %}
            <div class="row justify-content-center">
                <div class="col-lg-8 mx-auto mbr-form">
                    <form action="/login" method="POST" class="mbr-form form-with-styler" data-verified="">
                        <div class="row">
                            
                            <div hidden="hidden" data-form-alert-danger="" class="alert alert-danger col-12">
                                Oops...! some problem!
                            </div>
                        </div>
                        <div class="dragArea row">
                            <div class="col-md col-sm-12 form-group mb-3" data-for="email">
                                <input type="email" name="email" placeholder="E-mail" data-form-field="email" class="form-control" value="" id="email-form02-2">
                            </div>
                            <div class="col-md col-sm-12 form-group mb-3" data-for="password">
                                <input type="password" name="senha" placeholder="senha" data-form-field="senha" class="form-control" value="" id="name-form02-2">
                            </div>
                            
                            <div class="col-lg-12 col-md-12 col-sm-12 align-center mbr-section-btn">
                                <button type="submit" class="btn btn-primary display-7">Login</button>
                            </div>
                            <div class="col-lg-12 col-md-12 col-sm-12 align-center mbr-section-btn">
                                <a href="{{url_for('cadastro')}}" class="btn btn-primary display-7">Cadastro</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
    </div>
</body>
{% endif %}
{% endblock %}
