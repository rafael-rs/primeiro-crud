{% extends "base.html" %}

{% block content %}
<section data-bs-version="5.1" class="form5 cid-v0jo7JVJXO" id="form02-8">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 content-head">
                <div class="mbr-section-head mb-5">
                    <h3 class="mbr-section-title mbr-fonts-style align-center mb-0 display-2">
                        <strong>Cadastro</strong>
                    </h3>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8 mx-auto mbr-form">
                <form action="{{ url_for('cadastro') }}" method="POST" class="mbr-form form-with-styler">
                    
                    {% if error %}
                        <div class="alert alert-danger col-12">{{ error }}</div>
                    {% endif %}
                    {% if success %}
                        <div class="alert alert-success col-12">{{ success }}</div>
                    {% endif %}

                    <div class="dragArea row">
                        <div class="col-md col-sm-12 form-group mb-3">
                            <input type="text" name="nome" placeholder="Nome completo" 
                                   class="form-control" required>
                        </div>

                        <div class="col-md col-sm-12 form-group mb-3">
                            <input type="email" name="email" placeholder="E-mail" 
                                   class="form-control" required>
                        </div>

                        <div class="col-md col-sm-12 form-group mb-3">
                            <input type="number" name="idade" placeholder="Idade" 
                                   class="form-control" required>
                        </div>

                        <div class="col-md col-sm-12 form-group mb-3">
                            <input type="password" name="senha" placeholder="Senha" 
                                   class="form-control" required>
                        </div>

                        <div class="col-lg-12 col-md-12 col-sm-12 align-center mbr-section-btn">
                            <button type="submit" class="btn btn-primary display-7">Cadastrar</button>
                        </div>

                        <div class="col-lg-12 col-md-12 col-sm-12 align-center mt-3">
                            <a href="{{ url_for('home') }}" class="btn btn-secondary display-7">Voltar</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>  
</section>
{% endblock %}
